# Shared components for the subgen admin & subscription API:
#   - the admin session cookie security scheme,
#   - the two generic response bodies (idiomatic 4xx/5xx -> errMessage; plain
#     success -> message),
#   - the mihomo routing-config types, shared by config_get (response) and
#     config_save (request).
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: subgen_admin

  schemas:
    ErrorResponse:
      type: object
      required: [errMessage]
      properties:
        errMessage:
          type: string
          description: Human-readable (generic) error message for the SPA to toast.

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # A typed routing target / proxy-group member. kind is a PolicyKind
    # (direct|reject|...|inbound|group); inboundId is set when kind=inbound (the
    # node_inbounds.id), groupIdx when kind=group (index into the groups array — real
    # ids never cross the wire).
    PolicyRef:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
        inboundId:
          type: integer
          format: int64
        groupIdx:
          type: integer

    MihomoProvider:
      type: object
      required: [name, behavior, format, url, interval, mirror, mirrorInterval]
      properties:
        name:
          type: string
        behavior:
          type: string
        format:
          type: string
        url:
          type: string
        interval:
          type: integer
        mirror:
          type: boolean
        mirrorInterval:
          type: integer

    # A sub-condition of a logical rule (AND/OR/NOT), recursive. It is a matcher, not a
    # full rule: no target and no noResolve. value is the plain payload (omitted for
    # RULE-SET and the logical types); providerIdx references a rule-provider for a
    # RULE-SET sub-condition; conditions nests when type is itself logical.
    MihomoCondition:
      type: object
      required: [type]
      properties:
        type:
          type: string
        value:
          type: string
        providerIdx:
          type: integer
        conditions:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/MihomoCondition'

    # A routing rule. value is the plain matcher payload — optional, omitted for MATCH,
    # RULE-SET and the logical types. For RULE-SET the rule-provider is referenced by
    # providerIdx (index into the providers array — real ids never cross the wire), not by
    # name in value. conditions is the sub-condition list of a logical rule (AND/OR/NOT).
    MihomoRule:
      type: object
      required: [type, target]
      properties:
        type:
          type: string
        value:
          type: string
        providerIdx:
          type: integer
        noResolve:
          type: boolean
        target:
          $ref: './common.yaml#/components/schemas/PolicyRef'
        conditions:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/MihomoCondition'

    # A proxy-group. interval/tolerance/lazy are optional — sent only for the types that
    # use them (interval/lazy for the health-check types, tolerance for url-test).
    MihomoGroup:
      type: object
      required: [name, type, url, members]
      properties:
        name:
          type: string
        type:
          type: string
        url:
          type: string
        interval:
          type: integer
        tolerance:
          type: integer
        lazy:
          type: boolean
        members:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/PolicyRef'

    # The mihomo routing config: config_get returns it, config_save accepts it
    # (plus a userId in the save body). The profile* fields are the per-config
    # subscription knobs (Profile-Title, Content-Disposition filename,
    # Profile-Update-Interval in hours).
    MihomoConfig:
      type: object
      required: [groups, rules, providers, baseYAML, profileTitle, filename, profileUpdateInterval]
      properties:
        groups:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/MihomoGroup'
        rules:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/MihomoRule'
        providers:
          type: array
          items:
            $ref: './common.yaml#/components/schemas/MihomoProvider'
        baseYAML:
          type: string
        profileTitle:
          type: string
        filename:
          type: string
        profileUpdateInterval:
          type: integer

# POST /admin/api/users/create — create a user (nickname + the inbound ids to bind)
# and provision its 3x-ui clients.
post:
  operationId: userCreate
  summary: Create a user
  security:
    - adminSession: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [name, inboundIDs]
          properties:
            name:
              type: string
            inboundIDs:
              type: array
              items:
                type: integer
                format: int64
  responses:
    '200':
      description: created
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/MessageResponse'
    '400':
      description: invalid input
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    '401':
      description: unauthorized
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    '409':
      description: nickname already taken
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'

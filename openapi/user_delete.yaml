# POST /admin/api/users/delete — delete a user (and deprovision its panel clients).
post:
  operationId: userDelete
  summary: Delete a user
  security:
    - adminSession: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
  responses:
    '200':
      description: deleted
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/MessageResponse'
    '400':
      description: bad request
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    '401':
      description: unauthorized
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'

# POST /admin/api/users/edit — re-bind a user to a new inbound-id set (re-provisions).
post:
  operationId: userEdit
  summary: Edit a user's inbound bindings
  security:
    - adminSession: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [id, inboundIDs]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1
            inboundIDs:
              type: array
              minItems: 1
              items:
                type: integer
                format: int64
                minimum: 1
  responses:
    '200':
      description: updated
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/MessageResponse'
    '400':
      description: invalid input
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'
    '401':
      description: unauthorized
      content:
        application/json:
          schema:
            $ref: './common.yaml#/components/schemas/ErrorResponse'

schema: spec-driven

# Project context — shown to the AI when creating artifacts.
context: |
  subgen is a standalone mihomo/Clash.Meta subscription server (Go). It provisions
  VLESS clients on a fleet of 3x-ui panels and renders per-subscriber mihomo configs.

  Authority: AGENTS.md is the single source of truth for code style and architecture.
  Always read it before proposing or designing a change. The design doc is docs/subgen.md.

  Tech stack:
  - Go service; HTTP contract described in OpenAPI (openapi/), handlers generated by ogen
    (internal/oas). Add/change an endpoint by editing the spec, then `go generate`, then a
    handler against the generated interface. Routes are never registered by hand.
  - SQLite store (modernc) with an ordered migration runner (migrations.Apply: 0001 baseline
    + NNNN-*.sql by name, tracked in schema_migrations, forward-only, pure DDL).
  - External 3x-ui panels via internal/clients/xui (thin DTO->domain adapter, Bearer token).
  - Frontend: a minimal Vue 3 SPA (no bundler) in internal/handlers/web/static.

  Architecture (hard rules — see AGENTS.md "Target rules"):
  - Layers flow bottom-up: repository|clients -> service -> handler. The lower layer never
    knows the upper one. No `App` oracle; composition is in cmd/service/main.go.
  - One package per action (internal/handlers/<action>) / per entity repository.
  - Dependencies are private interfaces in a per-package contract.go + mockgen mocks,
    named after the concrete dependency (usersRepo, fleetService, panelClient).
  - Strong-typed entity: typed constants over magic strings; entity references by numeric id,
    never by name/port; string-content comparison is forbidden.
  - Errors are sentinel constants in entity (no interpolation). Lower layers wrap technical
    errors; the handler classifies by sentinel: domain -> typed 4xx with a local message
    constant (slog.Warn); infrastructure -> 5xx (slog.Error). A DB error is never a 400.
  - Value validation lives in the service layer (sentinel errors), not in the OpenAPI schema.
  - Uniqueness is caught from the DB constraint code (repository/dberr), not pre-check SELECTs.

  Conventions:
  - English only, everywhere in the repo — no Cyrillic anywhere in the tree (the AGENTS.md
    grep guard must stay empty). The single exception is operator-entered data in the store.
  - Tests are strict table-driven (testify require/assert + gomock), one Test{Type}_{Method}
    per method. Integration tests live in apitest/ (black-box, build tag `apitest`).
  - Every PR adds one CHANGELOG.md entry (`## YYYY-MM-DD — <title> (#PR)`, reverse-chrono,
    no version sections).
  - Work happens in a git worktree on its own branch -> PR (never edit main directly).

  Planning process: design decisions are recorded as OpenSpec changes (this directory).
  This replaces the former ADR process (the docs/decisions/ catalog was removed).

# Per-artifact rules — constraints applied when generating each artifact type.
rules:
  proposal:
    - Write in English. Keep it tight — Why / What Changes / Impact.
    - Read AGENTS.md first; the change must fit the existing layered architecture.
  specs:
    - Write in English. Each requirement text contains SHALL or MUST.
    - Every requirement has at least one #### Scenario with WHEN / THEN (/ AND) steps.
    - Describe observable behavior and invariants, not implementation details.
  design:
    - Write in English. Justify the choice and the trade-off, like the old ADRs did
      (Context / Considered Options / Decision / Consequences is a good shape).
    - Respect the hard rules in AGENTS.md (layering, sentinel errors, no magic strings).
  tasks:
    - Write in English. Order tasks so each leaves the build green (go build/vet, tests).
